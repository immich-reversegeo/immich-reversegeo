site_name: Immich ReverseGeo
site_description: Reverse geocoding companion for Immich photo assets
site_url: https://immich-reversegeo.github.io/
repo_url: https://github.com/immich-reversegeo/immich-reversegeo
repo_name: immich-reversegeo/immich-reversegeo
docs_dir: docs/website
site_dir: _out/website
use_directory_urls: true

theme:
  variant: modern
  language: en
  logo: assets/images/logo-mark.svg
  favicon: assets/images/logo-mark.svg
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/external-links.js

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.highlight
  - pymdownx.snippets:
      check_paths: true
      url_download: true
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Setup:
      - Getting Started: getting-started.md
      - Installation: installation.md
      - Configuration: configuration.md
  - Guide / App:
      - Using the App: using-the-app.md
      - Architecture: architecture.md
      - Changelog: changelog.md
  - Help:
      - Troubleshooting: troubleshooting.md
      - Support: support.md
  - Legal:
      - Privacy: privacy.md
      - Terms of Service: tos.md
