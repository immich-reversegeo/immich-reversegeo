name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install -r docs/website/requirements.txt

      - name: Restore
        run: dotnet restore immich-reversegeo.slnx

      - name: Test
        run: dotnet test immich-reversegeo.slnx --configuration Release --filter "TestCategory!=Integration&TestCategory!=Performance"

      - name: Publish app
        run: dotnet publish src/ImmichReverseGeo.Web/ImmichReverseGeo.Web.csproj -c Release -o artifacts/web

      - name: Build docs
        run: zensical build --clean

      - name: Archive app
        run: Compress-Archive -Path artifacts/web/* -DestinationPath immich-reversegeo-web.zip
        shell: pwsh

      - name: Archive docs
        run: Compress-Archive -Path _out/website/* -DestinationPath immich-reversegeo-docs.zip
        shell: pwsh

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            immich-reversegeo-web.zip
            immich-reversegeo-docs.zip
