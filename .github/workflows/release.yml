name: Release

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Optional label for the release artifacts"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install -r docs/website/requirements.txt

      - name: Restore
        run: dotnet restore immich-reversegeo.slnx

      - name: Test
        run: dotnet test --solution immich-reversegeo.slnx --configuration Release --filter "TestCategory!=Integration&TestCategory!=Performance"

      - name: Publish app
        run: dotnet publish src/ImmichReverseGeo.Web/ImmichReverseGeo.Web.csproj -c Release -o artifacts/web

      - name: Build docs
        run: zensical build --clean

      - name: Archive app
        run: Compress-Archive -Path artifacts/web/* -DestinationPath immich-reversegeo-web.zip
        shell: pwsh

      - name: Archive docs
        run: Compress-Archive -Path _out/website/* -DestinationPath immich-reversegeo-docs.zip
        shell: pwsh

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.release_name != '' && format('{0}-web', inputs.release_name) || 'immich-reversegeo-web' }}
          path: immich-reversegeo-web.zip

      - name: Upload docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.release_name != '' && format('{0}-docs', inputs.release_name) || 'immich-reversegeo-docs' }}
          path: immich-reversegeo-docs.zip
