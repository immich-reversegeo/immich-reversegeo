name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  app:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore immich-reversegeo.slnx

      - name: Build
        run: dotnet build immich-reversegeo.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution immich-reversegeo.slnx --configuration Release --no-build --filter "TestCategory!=Integration&TestCategory!=Performance"

      - name: Build Docker image
        run: docker build -f src/ImmichReverseGeo.Web/Dockerfile -t immich-reversegeo:test .
