name: Publish Docker Image

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "src/ImmichReverseGeo.Web/Dockerfile"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:
    inputs:
      publish_latest:
        description: "Publish latest in addition to sha tag"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/immich-reversegeo
          tags: |
            type=raw,value=edge,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.publish_latest == true }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/ImmichReverseGeo.Web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
