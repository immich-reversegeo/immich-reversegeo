name: Deploy Docs

on:
  push:
    branches:
      - master
    paths:
      - "docs/website/**"
      - "mkdocs.yml"
      - "docker-compose.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install -r docs/website/requirements.txt

      - name: Build site
        run: zensical build --clean

      - name: Publish to root Pages repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          repository-name: immich-reversegeo/immich-reversegeo.github.io
          branch: master
          folder: _out/website
          single-commit: true
